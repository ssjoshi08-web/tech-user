- name: Fail pipeline if CRITICAL or HIGH vulnerabilities exist
  continue-on-error: true  # Add this line to allow the pipeline to continue
  run: |
    set -e
    if [ ! -f trivy-fs-report.txt ]; then
      echo "Trivy text report missing — failing as a safety measure."
      exit 1
    fi
    CRITICAL_COUNT=$(grep -c "CRITICAL" trivy-fs-report.txt || true)
    HIGH_COUNT=$(grep -c "HIGH" trivy-fs-report.txt || true)
    echo "CRITICAL findings: $CRITICAL_COUNT"
    echo "HIGH findings:     $HIGH_COUNT"
    if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
      echo "::warning::Trivy reported CRITICAL or HIGH vulnerabilities."
      exit 1
    fi
    echo "No CRITICAL or HIGH vulnerabilities detected."
