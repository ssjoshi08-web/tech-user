name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/**", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

env:
  MAVEN_OPTS: "-Dmaven.repo.local=$GITHUB_WORKSPACE/.m2/repository -Xmx2g"
  JAVA_VERSION: "21"

jobs:
  # =========================================================================
  # Stage 1 - Build
  # =========================================================================
  build:
    name: "Stage 1 - Build"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          check-latest: true

      - name: Validate Maven wrapper / settings
        run: mvn -v

      - name: Maven Clean
        run: mvn -B clean

      - name: Maven Compile
        run: mvn -B compile -DskipTests

      - name: Maven Package (no tests)
        run: mvn -B package -DskipTests

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: user-api-jar
          path: target/user-api.jar
          if-no-files-found: error
          retention-days: 7

  # =========================================================================
  # Stage 2 - Test
  # =========================================================================
  test:
    name: "Stage 2 - Test"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          check-latest: true

      - name: Execute JUnit tests and generate JaCoCo report
        run: mvn -B test jacoco:report

      - name: Verify coverage threshold (>= 60%)
        run: mvn -B verify
        env:
          MAVEN_OPTS: "${{ env.MAVEN_OPTS }}"

      - name: Publish Surefire test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports
          retention-days: 14

      - name: Publish JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          retention-days: 14

  # =========================================================================
  # Stage 3 - Security Scan (Trivy)
  # =========================================================================
  security-scan:
    name: "Stage 3 - Security Scan"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.24.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: trivy-fs-report.txt
          # exit-code removed so this step does NOT fail the job; we fail explicitly later
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          # Don't fail here, we'll fail explicitly after publishing SARIF.

      - name: Run Trivy source code scan (config only)
        if: always()
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: "config"
          format: sarif
          output: trivy-config.sarif
          ignore-unfixed: true

      - name: Run Trivy dependency scan (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: "vuln"
          format: sarif
          output: trivy-deps.sarif
          ignore-unfixed: true

      - name: Run Trivy filesystem scan (SARIF for GitHub Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          ignore-unfixed: true

      # --- Defensive checks and guarded SARIF uploads ---
      - name: Check trivy-fs.sarif exists
        id: check_fs_sarif
        run: |
          if [ -f trivy-fs.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload Trivy filesystem scan results to GitHub Security
        if: always() && steps.check_fs_sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Check trivy-deps.sarif exists
        id: check_deps_sarif
        run: |
          if [ -f trivy-deps.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload Trivy dependency scan results to GitHub Security
        if: always() && steps.check_deps_sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-deps.sarif
          category: trivy-deps

      - name: Check trivy-config.sarif exists
        id: check_config_sarif
        run: |
          if [ -f trivy-config.sarif ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload Trivy config scan results to GitHub Security
        if: always() && steps.check_config_sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Upload Trivy text report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt
          retention-days: 14

      - name: Fail pipeline if CRITICAL or HIGH vulnerabilities exist
        run: |
          set -e
          if [ ! -f trivy-fs-report.txt ]; then
            echo "Trivy text report missing — failing as a safety measure."
            exit 1
          fi
          CRITICAL_COUNT=$(grep -c "CRITICAL" trivy-fs-report.txt || true)
          HIGH_COUNT=$(grep -c "HIGH" trivy-fs-report.txt || true)
          echo "CRITICAL findings: $CRITICAL_COUNT"
          echo "HIGH findings:     $HIGH_COUNT"
          if [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Trivy reported CRITICAL or HIGH vulnerabilities — failing the pipeline."
            exit 1
          fi
          echo "No CRITICAL or HIGH vulnerabilities detected."
  # =========================================================================
  # Stage 4 - AI Review
  # =========================================================================
  ai-review:
    name: "Stage 4 - AI Review"
    needs: [build, test, security-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      id-token: write
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff vs main
        id: diff
        run: |
          git fetch --no-tags --depth=1 origin main
          git diff --unified=0 origin/main...HEAD > diff.patch || echo "diff.patch created"
          echo "diff_path=diff.patch" >> "$GITHUB_OUTPUT"
          echo "lines=$(wc -l < diff.patch)" >> "$GITHUB_OUTPUT"
      - name: AI code review (Claude)
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        uses: anthropics/claude-code-action@beta
        with:
          prompt: |
            You are the `claude-review-agent` defined in `review-agent.md` and
            governed by `claude.md`. Review the diff in `diff.patch` and any
            changed files in this repository. Apply the hard rules and soft
            rules from `review-agent.md` strictly.
            End your response with one of these literal lines on its own:
              DECISION: PASS
              DECISION: FAIL
            The line MUST be the very last line of your response.
          claude_args: |
            --model claude-3-5-sonnet-latest
            --max-turns 8
      - name: Hardcoded decision check
        if: always()
        run: |
          echo "AI review step completed. This stage requires manual approval for production deployments."
          echo "If your organization enables auto-promotion, ensure the decision line above is parsed by a subsequent job."
  # =========================================================================
  # Stage 5 - Deploy
  # =========================================================================
  deploy:
    name: "Stage 5 - Deploy"
    needs: [build, test, security-scan, ai-review]
    runs-on: [self-hosted, linux, ubuntu]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Pull latest code
        run: |
          set -e
          cd "$GITHUB_WORKSPACE"
          git fetch --all --prune
          git checkout main
          git pull --ff-only origin main
      - name: Build jar
        run: |
          set -e
          mvn -B clean package -DskipTests
          ls -la target/user-api.jar
      - name: Stop existing application
        run: |
          set -e
          pkill -f user-api.jar || true
          sleep 3
          pkill -9 -f user-api.jar || true
      - name: Deploy new jar
        run: |
          set -e
          mkdir -p "$HOME/apps/user-api"
          install -m 0644 target/user-api.jar "$HOME/apps/user-api/user-api.jar"
      - name: Start new application
        run: |
          set -e
          cd "$HOME/apps/user-api"
          nohup java -jar user-api.jar > app.log 2>&1 &
          disown || true
      - name: Verify health endpoint
        id: health
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then
              echo "Health check passed after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Health check failed after 60s"
          exit 1
      - name: Rollback on failure
        if: failure() && steps.health.conclusion == 'failure'
        run: |
          set -e
          echo "Rolling back deployment..."
          pkill -f user-api.jar || true
          sleep 3
          BACKUP=$(ls -1t "$HOME/apps/user-api/backups" 2>/dev/null | head -n 1 || true)
          if [ -n "$BACKUP" ]; then
            cp -f "$HOME/apps/user-api/backups/$BACKUP" "$HOME/apps/user-api/user-api.jar"
            cd "$HOME/apps/user-api"
            nohup java -jar user-api.jar > app.log 2>&1 &
            disown || true
            echo "Rolled back to $BACKUP"
          else
            echo "No backup found — manual intervention required."
            exit 1
